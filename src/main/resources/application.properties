spring.application.name=plataforma-cursos
server.port=${SERVER_PORT:8080}

# ---------------------------------------------------------------------------
# Base de datos: Oracle Cloud (Autonomous Database)
# Se configura mediante variables de entorno para no exponer credenciales.
#
#   DB_URL      -> jdbc:oracle:thin:@<tns_name>?TNS_ADMIN=/app/wallet
#   DB_USERNAME -> usuario de la base de datos (ej. ADMIN)
#   DB_PASSWORD -> contrasena del usuario
#
# El wallet descargado de Oracle Cloud se monta/copia en la ruta indicada por
# TNS_ADMIN (ver Dockerfile y README).
# ---------------------------------------------------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# ---------------------------------------------------------------------------
# AWS S3: almacenamiento de los resumenes de inscripcion (Semana 2)
#   AWS_S3_BUCKET -> nombre del bucket
#   AWS_REGION    -> region del bucket (ej. us-east-1)
# Credenciales: se resuelven con la cadena por defecto del SDK
#   (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY en local, o IAM Role en EC2).
# ---------------------------------------------------------------------------
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:plataforma-cursos-resumenes}

# Actuator: healthcheck usado por Docker/EC2
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=Sistema de inscripcion de cursos virtuales
