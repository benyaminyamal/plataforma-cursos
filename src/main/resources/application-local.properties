# Perfil "local": base de datos H2 en memoria para desarrollo y pruebas
# Activar con: --spring.profiles.active=local  (o SPRING_PROFILES_ACTIVE=local)

spring.datasource.url=jdbc:h2:mem:plataforma;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
