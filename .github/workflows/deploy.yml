name: CI/CD - Build, Push & Deploy

# Se ejecuta automaticamente con cada push a la rama main
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: plataforma-cursos

jobs:
  # ----------------------------------------------------------------
  # 1) Compilar, ejecutar pruebas y construir/publicar la imagen
  # ----------------------------------------------------------------
  build-and-push:
    name: Build, test & push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build & test (Maven)
        run: mvn -B clean package

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: meta
        run: echo "image=${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------------
  # 2) Desplegar la imagen en la instancia EC2 (via SSH)
  # ----------------------------------------------------------------
  deploy-ec2:
    name: Deploy to AWS EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE
          script_stop: true
          script: |
            IMAGE="${{ needs.build-and-push.outputs.image }}:latest"
            echo "Desplegando ${IMAGE}..."

            # Autenticacion opcional en Docker Hub (necesaria si el repo es privado)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin || true

            docker pull "${IMAGE}"

            docker stop plataforma-cursos 2>/dev/null || true
            docker rm   plataforma-cursos 2>/dev/null || true

            docker run -d \
              --name plataforma-cursos \
              --restart unless-stopped \
              -p 80:8080 \
              -e SPRING_PROFILES_ACTIVE=default \
              -e DB_URL='${{ secrets.DB_URL }}' \
              -e DB_USERNAME='${{ secrets.DB_USERNAME }}' \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e TNS_ADMIN=/app/wallet \
              -e AWS_REGION='${{ secrets.AWS_REGION }}' \
              -e AWS_S3_BUCKET='${{ secrets.AWS_S3_BUCKET }}' \
              -v /home/${{ secrets.EC2_USER }}/wallet:/app/wallet:ro \
              "${IMAGE}"

            # Limpieza de imagenes antiguas
            docker image prune -f
            echo "Despliegue finalizado."
